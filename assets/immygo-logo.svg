<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4" />
      <stop offset="50%" style="stop-color:#6366F1" />
      <stop offset="100%" style="stop-color:#8B5CF6" />
    </linearGradient>
    <linearGradient id="markLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="300" cy="300" r="270"/>
    </clipPath>
  </defs>

  <!-- Round background -->
  <circle cx="300" cy="300" r="270" fill="#FAFAFA"/>

  <!-- Clipped content -->
  <g clip-path="url(#circleClip)">

    <!-- The "I" mark -->
    <g transform="translate(300, 238)">
      
      <!-- Main vertical bar -->
      <rect x="-42" y="-115" width="84" height="235" rx="18" fill="url(#mark)"/>
      
      <!-- Top dot -->
      <circle cx="0" cy="-155" r="34" fill="url(#mark)"/>
      <circle cx="0" cy="-155" r="18" fill="#FAFAFA"/>
      <circle cx="0" cy="-155" r="7" fill="url(#markLight)" fill-opacity="0.7"/>
      
      <!-- Slider -->
      <rect x="-26" y="-82" width="52" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="8" cy="-79.5" r="9" fill="#FFFFFF" fill-opacity="0.92"/>
      
      <!-- Toggle -->
      <rect x="-21" y="-45" width="42" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="11" cy="-35" r="7.5" fill="#FFFFFF" fill-opacity="0.92"/>
      
      <!-- Button -->
      <rect x="-24" y="-2" width="48" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.92"/>
      <rect x="-12" y="7" width="24" height="4" rx="2" fill="url(#mark)" fill-opacity="0.4"/>
      
      <!-- Checkbox -->
      <rect x="-13" y="42" width="26" height="26" rx="7" fill="#FFFFFF" fill-opacity="0.92"/>
      <path d="M-5 55 L-1 60 L11 48" stroke="url(#mark)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Progress bar -->
      <rect x="-26" y="90" width="52" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.25"/>
      <rect x="-26" y="90" width="35" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.92"/>
    </g>

    <!-- Subtle accent orbs -->
    <circle cx="170" cy="165" r="18" fill="#06B6D4" fill-opacity="0.1"/>
    <circle cx="155" cy="310" r="12" fill="#6366F1" fill-opacity="0.08"/>
    <circle cx="435" cy="150" r="14" fill="#8B5CF6" fill-opacity="0.08"/>
    <circle cx="445" cy="280" r="22" fill="#06B6D4" fill-opacity="0.1"/>
    <circle cx="420" cy="370" r="9" fill="#6366F1" fill-opacity="0.06"/>

    <!-- Wordmark -->
    <text x="300" y="458" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="900" text-anchor="middle" letter-spacing="-3" fill="#1E1B3A">
      <tspan>immy</tspan><tspan fill="url(#mark)">go</tspan>
    </text>
    <text x="300" y="488" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle" fill="#1E1B3A" fill-opacity="0.35" letter-spacing="5">DESKTOP UI FRAMEWORK</text>
  </g>

  <!-- Subtle border ring -->
  <circle cx="300" cy="300" r="270" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-opacity="0.12"/>
</svg>
